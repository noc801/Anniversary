<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy First Anniversary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main wrapper -->
    <div class="page-wrapper">

        <!-- Background heart -->
        <div class="heart-background">
            <div class="heart"></div>
        </div>

        <!-- Foreground content -->
        <div class="generator-container">
            <h1>Reasons I Love You</h1>

            <p id="reasonText">Tap the button to see a reason.</p>

            <button id="newReasonBtn">Show Me Another</button>

            <p class="note">Every click is another piece of my heart. Selamat hari jadi!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
